## Per-fandom cover generation
## ─────────────────────────────
## Add to your [archiveofourown.org] section.
##
## Replace "Classics Sherlock" etc. with the names of your own
## Generate Cover presets. Names must match exactly.
##
## Rules are checked top to bottom — first match wins.
## Put your most specific rules first.
## The default cover (set in the FFF GUI) applies to anything that
## doesn't match.

[archiveofourown.org]
generate_cover_settings:
    ## Fandom-specific rules
    ## Patterns are regular expressions — simple names work as-is.
    ## Use [Ss]herlock for case-insensitive matching.
    ## Use | for either/or: Fandom A|Fandom B
    ${category} => [Ss]herlock                   => Classics Sherlock
    ${category} => Heated Rivalry|Game Changers  => Classics HR
    ${category} => Omens                         => Classics Omens

    ## Catch-all for long titles — matches anything with 40+ characters.
    ## Adjust the number to suit your template.
    ## Sits at the bottom so fandom rules take priority.
    ${title}    => .{40,}                        => Classics Small
