## Metadata normalization
## ───────────────────────
## Add to the add_to_replace_metadata block in your [defaults] section.
## If you don't have one yet, create it as shown below.
##
## Rules run in order — sequence matters.
## The paren-stripping rule must come before OC standardization,
## so "Original Character (Fandom)" loses its qualifier before
## being matched.

[defaults]
add_to_replace_metadata:
    ## Strip fandom qualifiers from ship names.
    ## "Greg Lestrade (Sherlock)" → "Greg Lestrade"
    ## Note: does not affect "(s)" suffix — no space before it.
    ships=> \([^)]+\)=>

    ## Standardize original character tags — ships.
    ## Substring match: OC name appears inside a full ship string,
    ## e.g. "Sherlock Holmes/Original Female Character(s)"
    ships=>(?i)Original Male Character(\(s\)|s|)=>OMC
    ships=>(?i)Original Female Character(\(s\)|s|)=>OFC
    ships=>(?i)Original Character(\(s\)|s|)=>OC

    ## Standardize original character tags — characters field.
    ## Whole-string match: each character tag is its own entry.
    characters=>(?i)^Original Male Character(\(s\)|s|)$=>OMC
    characters=>(?i)^Original Female Character(\(s\)|s|)$=>OFC
    characters=>(?i)^Original Character(\(s\)|s|)$=>OC

    ## Convert friendship tags to a consistent & format.
    ## "Character A/Character B (Friendship)" → "Character A & Character B"
    ## Also handles & relationships tagged with "- Relationship" suffix.
    ships=>(.*)[/&](.*) \(?[Ff]riendship(?: only)?\)?=>\1 & \2
    ships=> - Relationship=>
