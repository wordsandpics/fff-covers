## personal.ini — full example
## ─────────────────────────────
## This file assembles all the snippets from the fff-covers guide
## into a single working example.
##
## To use: copy the sections you need into your own personal.ini.
## Your personal.ini lives at ~/.fanficfare/personal.ini (macOS/Linux)
## or %APPDATA%\fanficfare\personal.ini (Windows).
##
## Sections marked OPTIONAL can be skipped if you don't need them.


## ════════════════════════════════════════════════════════════
## [defaults] — applies to all sites
## ════════════════════════════════════════════════════════════

[defaults]
is_adult:true


## ── Ship extraction pipeline (Step 5) ── OPTIONAL ───────────
## Remove this block if you're using the basic short_ship template
## from Step 4 instead.

add_to_extra_valid_entries: ,all_slashes,primary_slash,secondary_slash

include_in_all_slashes: ships

keep_in_order_ships:true
keep_in_order_all_slashes:true

include_metadata_pre:
    all_slashes=~/

include_in_primary_slash: all_slashes
include_in_secondary_slash: all_slashes


## ── Metadata cleanup + ship extraction (Steps 5 & 6) ────────

add_to_replace_metadata:
    ## Fandom qualifier stripping (Step 6)
    ships=> \([^)]+\)=>

    ## OC standardization — ships (Step 6)
    ships=>(?i)Original Male Character(\(s\)|s|)=>OMC
    ships=>(?i)Original Female Character(\(s\)|s|)=>OFC
    ships=>(?i)Original Character(\(s\)|s|)=>OC

    ## OC standardization — characters (Step 6)
    characters=>(?i)^Original Male Character(\(s\)|s|)$=>OMC
    characters=>(?i)^Original Female Character(\(s\)|s|)$=>OFC
    characters=>(?i)^Original Character(\(s\)|s|)$=>OC

    ## Friendship tag normalization (Step 6)
    ships=>(.*)[/&](.*) \(?[Ff]riendship(?: only)?\)?=>\1 & \2
    ships=> - Relationship=>

    ## Ship extraction by position (Step 5)
    ## Remove these if not using the pipeline above.
    primary_slash_LIST=>^([^,]+).*$=>\1
    secondary_slash_LIST=>^[^,]+$=>
    secondary_slash_LIST=>^[^,]+,\s*([^,]+).*$=>\1


## ════════════════════════════════════════════════════════════
## [archiveofourown.org] — AO3-specific settings
## ════════════════════════════════════════════════════════════

[archiveofourown.org]
always_login:true
username:YOUR_USERNAME_HERE
password:YOUR_PASSWORD_HERE
is_adult:true


## ── Custom column mappings (Steps 3 & 5) ────────────────────
## Maps FFF metadata fields to your Calibre custom columns.
## Only include rows for columns you've created.

add_to_custom_columns_settings:
    ## Step 3 columns
    ## (these can also be set in the FFF GUI — no need to duplicate)
    # fandom=>#fandom
    # ships=>#ship
    # status=>#status
    # numWords=>#words
    # rating=>#contentrating

    ## Step 5 columns — ship extraction pipeline
    primary_slash=>#primary_slash
    secondary_slash=>#secondary_slash


## ── Cover generation (Steps 2, 5 & 6) ──────────────────────
## Rules are checked top to bottom — first match wins.
## Edit preset names to match your saved Generate Cover presets.

generate_cover_settings:
    ## Per-URL exclusions for fics with custom covers (Step 6)
    ## Add a line here for each fic you want to protect.
    ## The $ anchors to end of URL to prevent partial matches.
    # ${storyUrl} => works/12345$ =>
    # ${storyUrl} => works/67890$ =>

    ## Per-ship rules (Step 5) — OPTIONAL
    ## Requires #primary_slash column from the pipeline above.
    # ${primary_slash} => Character A/Character B => Your Preset Name

    ## Per-fandom rules (Step 2)
    ${category} => [Ss]herlock                   => Classics Sherlock
    ${category} => Heated Rivalry|Game Changers  => Classics HR
    ${category} => Omens                         => Classics Omens

    ## Long title catch-all (Step 6)
    ${title}    => .{40,}                        => Classics Small


