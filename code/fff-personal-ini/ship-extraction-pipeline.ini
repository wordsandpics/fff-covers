## Ship extraction pipeline — defaults section
## ─────────────────────────────────────────────
## Add to your [defaults] section.
##
## This snippet intercepts ship data inside FFF's processing pipeline,
## before Calibre's alphabetical sorting occurs, and extracts the
## first and second slash (romantic) ships into dedicated variables.
##
## Prerequisites:
##   - #primary_slash column in Calibre
##     (Comma separated text, like tags, shown in the Tag browser)
##   - #secondary_slash column in Calibre (same type)
##   - The column mappings snippet added to [archiveofourown.org]
##     (see ship-column-mappings.ini)

[defaults]
## Register internal scratch variables.
## The leading comma is required.
add_to_extra_valid_entries: ,all_slashes,primary_slash,secondary_slash

## Copy ships into all_slashes while they're still in author order.
include_in_all_slashes: ships

## Tell FFF not to alphabetise these fields during processing.
## keep_in_order_ships is the critical one — without it, author
## order is lost before the pipeline runs.
keep_in_order_ships:true
keep_in_order_all_slashes:true

## Filter all_slashes down to slash-only relationships.
## This drops all platonic & tags before extraction.
include_metadata_pre:
    all_slashes=~/

## Copy the filtered list into both extraction variables.
include_in_primary_slash: all_slashes
include_in_secondary_slash: all_slashes

## Extract ships by position.
## primary_slash gets the first item only.
## secondary_slash gets the second item only (cleared if only one ship).
add_to_replace_metadata:
    primary_slash_LIST=>^([^,]+).*$=>\1
    secondary_slash_LIST=>^[^,]+$=>
    secondary_slash_LIST=>^[^,]+,\s*([^,]+).*$=>\1
