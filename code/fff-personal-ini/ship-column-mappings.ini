## Ship extraction pipeline — archiveofourown.org section
## ─────────────────────────────────────────────────────────
## Add to your [archiveofourown.org] section.
##
## This maps the extracted ship variables to Calibre columns.
## The defaults-section half of this pipeline is in
## ship-extraction-pipeline.ini.

[archiveofourown.org]
## Write extracted ships to Calibre columns.
add_to_custom_columns_settings:
    primary_slash=>#primary_slash
    secondary_slash=>#secondary_slash


## ── Optional: per-ship cover templates ──────────────────────────────
##
## Once #primary_slash is populated you can assign cover templates
## per ship. Add these rules above your fandom rules — first match wins.
##
## Uncomment and edit to use:
# generate_cover_settings:
#     ${primary_slash} => Character A/Character B => Your Preset Name
#     ${primary_slash} => Character C/Character D => Your Other Preset
#     ${category}      => FandomName              => Your Fandom Preset
