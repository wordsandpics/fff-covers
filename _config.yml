title: fff-covers
description: Automatic cover generation for fanfiction — a guide for FanFicFare + Calibre users
baseurl: "/fff-covers"
url: "https://wordsandpics.github.io"

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

# Navigation — edit this to match your pages
nav:
  - title: Getting started
    pages:
      - label: Introduction
        url: /
  - title: Guide
    pages:
      - label: 1. Basic covers
        url: /basic-covers/
      - label: 2. Per-fandom covers
        url: /per-fandom/
      - label: 3. Custom columns
        url: /custom-columns/
      - label: 4. Advanced custom columns
        url: /advanced-columns/
      - label: 5. Obsessive nerdery 1- Advanced ships
        url: /advanced-ships/
      - label: 6. Obsessive nerdery 2- Tips & tricks
        url: /nerdery/
      
  - title: Reference & Files
    pages:
      - label: personal.ini snippets
        url: /code/fff-personal-ini/
      - label: Column templates
        url: /code/calibre-column-templates/
      - label: fic cover svgs
        url: /code/wordsandpics_classic_covers.zip
      - label: fic cover preset
        url: /code/classics_preset.zip

